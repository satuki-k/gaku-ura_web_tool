<!option robots 0>
<!option template users/template.html>
<!include admin.js>
<!option css_standalone 1>
<h1>{TITLE}</h1>
<p><!include custom/admin_shortcut.html></p>
<table>
	<thead>
		<tr id="f">
			<th colspan="5">
				<form action="" method="POST" enctype="multipart/form-data" id="form">
					<input type="hidden" name="csrf_token" value="{CSRF_TOKEN}">
					<label>
						<select name="new">
							<option value="folder">新規フォルダ</option>
							<option value="file">新規ファイル</option>
							<option value="php">PHP</option>
							<option value="html">html</option>
							<option value="css">css</option>
							<option value="js">Javascript</option>
							<option value="pl">perl</option>
							<option value="py">python3</option>
							<option value="db">SQLite DB</option>
							<option value=".htaccess">.htaccess</option>
							<option value="/sitemap.xml">/sitemap.xml</option>
							<option value="/robots.txt">/robots.txt</option>
						</select>
					</label>
					<label>名前<input type="text" name="name"></label>
					<label id="files"><input type="file" name="file0"></label>
					<label><button type="submit" name="submit" value="new">作成</button></label>
				</form>
			</th>
		</tr>
		<tr><th>名 前</th><th>編 集</th><th>詳 細</th><th>更 新</th></tr>
		<tr><td colspan="4">{SHORTCUT}</td></tr>
		<tr><td colspan="4">{PATH}</td></tr>
	</thead>
	<tbody>
		{FILE_LIST}
	</tbody>
</table>
<p id="version">gaku-ura{GAKU_URA_VERSION}</p>
<p>一度にアップロードできるファイル数や合計サイズは、php.iniの設定に依存します。</p>
<p>右クリックメニューの「全てダウンロード」は、選択したファイルではなく<b>現在のディレクトリ</b>をダウンロードします。</p>
<p style="display:none;" {API_ARGS}id="gaku-ura_args"></p>
