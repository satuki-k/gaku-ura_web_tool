<!option robots 0>
<!include admin_edit_table.js>
<h1>{TITLE}</h1>
<form method="POST" action="" enctype="multipart/form-data" id="form">
	<input type="hidden" name="csrf_token" value="{CSRF_TOKEN}">
	<input type="hidden" name="dbtype" value="{DBTYPE}">
	<input type="hidden" name="dbname" value="{DBNAME}">
	<input type="hidden" name="table" value="{TABLE}">
	<p>
		<a href="{EXIT}" id="exit">戻る</a> <a href="{EXIT}&File={DBNAME}&Menu=edit">詳細</a>
		<label><input type="file" name="file" accept=".csv,.tsv"></label>
		<label>as<input type="text" name="import_name" placeholder="same to file name"></label>
		<label><input type="checkbox" name="first_is_col" value="true">一行目をタイトルにする</label>
		<button type="submit" name="submit_type" value="{SUBMIT_TYPE}">保存</button>
	</p>
	<p>{TTITLE}  table切替<select name="ctable"><option value="">───</option>{TABLE_LIST}</select> <button type="submit" name="submit_type" value="{SUBMIT_TYPE}">変更</button></p>
	<p style="color:#ff0;">Issue:値以外の項目は各自でエスケープが必要です。UTF-8ではないファイルはインポートできません。</p>
	<div class="table">
		<table>
			<thead>
				<tr>{COLS}</tr>
			</thead>
			<tbody>
				{ROWS}
			</tbody>
		</table>
	</div>
	<p><label><input type="checkbox" name="export" value="true">export CSV</label></p>
	<p>
		<label>SQL実行<br><textarea name="query" rows="5"></textarea></label>
		<button type="submit" name="submit_type" value="{SUBMIT_TYPE}" id="exec">実行</button>
	</p>
</form>

<p><br></p>
<p><a href="../">ユーザーページへ</a></p>

<p><br></p>
<p id="version">gaku-ura{GAKU_URA_VERSION}</p>
