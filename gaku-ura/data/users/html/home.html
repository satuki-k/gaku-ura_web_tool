<!option robots 0>
<!include users.css>
<h1>ようこそ、{NAME} さん</h1>
<div class="panel">
	<div class="user_info">
		<h2>登録情報</h2>
		<form action="" method="POST" id="form">
			<p><label>名前<input type="text" name="name" value="{NAME}" placeholder="変更なし"></label></p>
			<p><label>新しいパスワード<input type="password" name="new_passwd" placeholder="変更なし"></label></p>
			<p><label>メールアドレス<input type="text" name="mail" value="{MAIL}"></label></p>
			<p><label>自己紹介<br><textarea name="profile" rows="5" placeholder="こんにちは">{PROFILE}</textarea></label></p>
			<p>権限レベル: {ADMIN}</p>
			<p><label><button type="submit" name="session_token" value="{SESSION_TOKEN}">変更</button></label></p>
		</form>
	</div>
	<div class="side">
		<h2>その他の情報</h2>
		<p><a href="?{NAME}">自分のユーザーページ</a></p>
		<form action="" method="POST">
			<input type="hidden" name="session_token" value="{SESSION_TOKEN}">
			<label><button type="submit" name="submit" value="logout">ログアウト</button></label>
		</form>
		{FOR_ADMIN}
		<!include custom/custom.html>
	</div>
</div>
